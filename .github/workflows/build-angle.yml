name: Build ANGLE

on:
  workflow_dispatch:
    inputs:
      angle_branch:
        description: 'ANGLE branch to build (e.g., chromium/7151)'
        required: true
        default: 'chromium/7151'
  push:
    tags:
      - 'chromium-*'

env:
  ANGLE_BRANCH: ${{ github.event.inputs.angle_branch || 'chromium/7151' }}

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH

      - name: Fetch ANGLE source
        run: |
          git clone https://chromium.googlesource.com/angle/angle.git angle/src
          cd angle/src
          git fetch origin $ANGLE_BRANCH
          git checkout FETCH_HEAD
          cd ..
          cat > .gclient <<'GCLIENT'
          solutions = [{ "name": "src", "url": "https://chromium.googlesource.com/angle/angle.git", "deps_file": "DEPS", "managed": False, "custom_vars": {} }]
          GCLIENT
          cd src
          gclient sync --no-history

      - name: Build macOS targets
        run: |
          for target in macos-aarch64 macos-x86_64; do
            echo "=== Building $target ==="
            bash scripts/build-angle.sh --target "$target" --angle-dir angle/src
          done

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          for target in macos-aarch64 macos-x86_64; do
            bash scripts/collect-artifacts.sh --target "$target" --angle-dir angle/src --output-dir artifacts
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: angle-macos
          path: artifacts/angle-*.tar.gz

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH

      - name: Fetch ANGLE source
        run: |
          git clone https://chromium.googlesource.com/angle/angle.git angle/src
          cd angle/src
          git fetch origin $ANGLE_BRANCH
          git checkout FETCH_HEAD
          cd ..
          cat > .gclient <<'GCLIENT'
          solutions = [{ "name": "src", "url": "https://chromium.googlesource.com/angle/angle.git", "deps_file": "DEPS", "managed": False, "custom_vars": {} }]
          GCLIENT
          cd src
          gclient sync --no-history

      - name: Install arm64 sysroot for cross-compilation
        run: |
          cd angle/src
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=arm64

      - name: Build Linux targets
        run: |
          for target in linux-x86_64 linux-aarch64; do
            echo "=== Building $target ==="
            bash scripts/build-angle.sh --target "$target" --angle-dir angle/src
          done

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          for target in linux-x86_64 linux-aarch64; do
            bash scripts/collect-artifacts.sh --target "$target" --angle-dir angle/src --output-dir artifacts
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: angle-linux
          path: artifacts/angle-*.tar.gz

  build-windows:
    runs-on: windows-2022
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH
          # Windows needs cipd bootstrapped explicitly
          export DEPOT_TOOLS_WIN_TOOLCHAIN=0
          echo "DEPOT_TOOLS_WIN_TOOLCHAIN=0" >> $GITHUB_ENV

      - name: Fetch ANGLE source
        env:
          DEPOT_TOOLS_WIN_TOOLCHAIN: '0'
        run: |
          git clone https://chromium.googlesource.com/angle/angle.git angle/src
          cd angle/src
          git fetch origin $ANGLE_BRANCH
          git checkout FETCH_HEAD
          cd ..
          cat > .gclient <<'GCLIENT'
          solutions = [{ "name": "src", "url": "https://chromium.googlesource.com/angle/angle.git", "deps_file": "DEPS", "managed": False, "custom_vars": {} }]
          GCLIENT
          cd src
          gclient sync --no-history

      - name: Build Windows targets
        env:
          DEPOT_TOOLS_WIN_TOOLCHAIN: '0'
        run: |
          for target in windows-x86_64 windows-aarch64; do
            echo "=== Building $target ==="
            bash scripts/build-angle.sh --target "$target" --angle-dir angle/src
          done

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          for target in windows-x86_64 windows-aarch64; do
            bash scripts/collect-artifacts.sh --target "$target" --angle-dir angle/src --output-dir artifacts
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: angle-windows
          path: artifacts/angle-*.tar.gz

  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH

      - name: Fetch ANGLE source (with Android deps)
        run: |
          git clone https://chromium.googlesource.com/angle/angle.git angle/src
          cd angle/src
          git fetch origin $ANGLE_BRANCH
          git checkout FETCH_HEAD
          cd ..
          cat > .gclient <<'GCLIENT'
          solutions = [{ "name": "src", "url": "https://chromium.googlesource.com/angle/angle.git", "deps_file": "DEPS", "managed": False, "custom_vars": { "checkout_android": True } }]
          target_os = ["android"]
          GCLIENT
          cd src
          gclient sync --no-history

      - name: Build Android targets
        run: |
          for target in android-arm64 android-arm32 android-x86_64; do
            echo "=== Building $target ==="
            bash scripts/build-angle.sh --target "$target" --angle-dir angle/src
          done

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          for target in android-arm64 android-arm32 android-x86_64; do
            bash scripts/collect-artifacts.sh --target "$target" --angle-dir angle/src --output-dir artifacts
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: angle-android
          path: artifacts/angle-*.tar.gz

  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH

      - name: Fetch ANGLE source
        run: |
          git clone https://chromium.googlesource.com/angle/angle.git angle/src
          cd angle/src
          git fetch origin $ANGLE_BRANCH
          git checkout FETCH_HEAD
          cd ..
          cat > .gclient <<'GCLIENT'
          solutions = [{ "name": "src", "url": "https://chromium.googlesource.com/angle/angle.git", "deps_file": "DEPS", "managed": False, "custom_vars": {} }]
          GCLIENT
          cd src
          gclient sync --no-history

      - name: Build iOS
        run: bash scripts/build-angle.sh --target ios-arm64 --angle-dir angle/src

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          bash scripts/collect-artifacts.sh --target ios-arm64 --angle-dir angle/src --output-dir artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: angle-ios
          path: artifacts/angle-*.tar.gz

  release:
    needs: [build-macos, build-linux, build-windows, build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/angle-*.tar.gz
          body: |
            ANGLE binaries built from branch `${{ env.ANGLE_BRANCH }}`.

            ## Platforms
            - macOS: aarch64, x86_64
            - Linux: x86_64, aarch64
            - Windows: x86_64, aarch64
            - Android: arm64, arm32, x86_64
            - iOS: arm64 (static)
