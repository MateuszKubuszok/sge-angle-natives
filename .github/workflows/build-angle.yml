name: Build ANGLE

on:
  workflow_dispatch:
    inputs:
      angle_branch:
        description: 'ANGLE branch to build (e.g., chromium/7151)'
        required: true
        default: 'chromium/7151'
  push:
    tags:
      - 'chromium-*'

env:
  ANGLE_BRANCH: ${{ github.event.inputs.angle_branch || 'chromium/7151' }}

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            targets: macos-aarch64 macos-x86_64
            artifact-name: macos
          - runner: ubuntu-22.04
            targets: linux-x86_64 linux-aarch64
            artifact-name: linux
          # Windows cross-compiled from Linux (depot_tools CIPD doesn't work on GHA Windows)
          - runner: ubuntu-22.04
            targets: windows-x86_64 windows-aarch64
            artifact-name: windows
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install depot_tools
        shell: bash
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH

      - name: Fetch ANGLE source
        shell: bash
        run: |
          git clone https://chromium.googlesource.com/angle/angle.git angle/src
          cd angle/src
          git fetch origin $ANGLE_BRANCH
          git checkout FETCH_HEAD
          # Create .gclient file for gclient sync
          cd ..
          cat > .gclient <<'GCLIENT'
          solutions = [
            {
              "name": "src",
              "url": "https://chromium.googlesource.com/angle/angle.git",
              "deps_file": "DEPS",
              "managed": False,
              "custom_vars": {},
            },
          ]
          GCLIENT
          cd src
          gclient sync --no-history

      - name: Build targets
        shell: bash
        run: |
          for target in ${{ matrix.targets }}; do
            echo "=== Building $target ==="
            bash scripts/build-angle.sh --target "$target" --angle-dir angle/src
          done

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          for target in ${{ matrix.targets }}; do
            bash scripts/collect-artifacts.sh --target "$target" --angle-dir angle/src --output-dir artifacts
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: angle-${{ matrix.artifact-name }}
          path: artifacts/angle-*.tar.gz

  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH

      - name: Fetch ANGLE source
        run: |
          git clone https://chromium.googlesource.com/angle/angle.git angle/src
          cd angle/src
          git fetch origin $ANGLE_BRANCH
          git checkout FETCH_HEAD
          cd ..
          cat > .gclient <<'GCLIENT'
          solutions = [
            {
              "name": "src",
              "url": "https://chromium.googlesource.com/angle/angle.git",
              "deps_file": "DEPS",
              "managed": False,
              "custom_vars": {},
            },
          ]
          GCLIENT
          cd src
          gclient sync --no-history

      - name: Build Android targets
        run: |
          for target in android-arm64 android-arm32 android-x86_64; do
            echo "=== Building $target ==="
            bash scripts/build-angle.sh --target "$target" --angle-dir angle/src
          done

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          for target in android-arm64 android-arm32 android-x86_64; do
            bash scripts/collect-artifacts.sh --target "$target" --angle-dir angle/src --output-dir artifacts
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: angle-android
          path: artifacts/angle-*.tar.gz

  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH

      - name: Fetch ANGLE source
        run: |
          git clone https://chromium.googlesource.com/angle/angle.git angle/src
          cd angle/src
          git fetch origin $ANGLE_BRANCH
          git checkout FETCH_HEAD
          cd ..
          cat > .gclient <<'GCLIENT'
          solutions = [
            {
              "name": "src",
              "url": "https://chromium.googlesource.com/angle/angle.git",
              "deps_file": "DEPS",
              "managed": False,
              "custom_vars": {},
            },
          ]
          GCLIENT
          cd src
          gclient sync --no-history

      - name: Build iOS
        run: bash scripts/build-angle.sh --target ios-arm64 --angle-dir angle/src

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          bash scripts/collect-artifacts.sh --target ios-arm64 --angle-dir angle/src --output-dir artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: angle-ios
          path: artifacts/angle-*.tar.gz

  release:
    needs: [build-desktop, build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/angle-*.tar.gz
          body: |
            ANGLE binaries built from branch `${{ env.ANGLE_BRANCH }}`.

            ## Platforms
            - macOS: aarch64, x86_64
            - Linux: x86_64, aarch64
            - Windows: x86_64, aarch64
            - Android: arm64, arm32, x86_64
            - iOS: arm64 (static)
